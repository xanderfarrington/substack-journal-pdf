<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ article.title }}</title>
  <style>
    :root {
      --accent: {{ article.primary_color }};
    }

    {{ css }}
  </style>
</head>

<body>
  <main class="page">
    <header class="masthead">
      {% if article.logo_url %}
      <img class="logo" src="{{ article.logo_url }}" alt="{{ article.publication }} logo">
      {% endif %}

      <div class="publication">{{ article.publication }}</div>
    </header>

    <section class="title-block">
      <div class="kicker">Essay</div>
      <h1>{{ article.title }}</h1>

      <div class="dek">
        By <span class="author">{{ article.author }}</span>
        {% if article.date %}
        <span class="dot">·</span>
        <span>{{ article.date }}</span>
        {% endif %}
      </div>

      <div class="rule"></div>
    </section>

    <article class="article-body">
      {{ article.body_html | safe }}
    </article>

    <footer class="source">
      Original source: {{ article.url }}
    </footer>
  </main>
</body>
</html>
